<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-on-surface": "#565555",
              "background": "#0e0e0e",
              "primary-container": "#00e3fd",
              "outline": "#767575",
              "on-background": "#ffffff",
              "inverse-surface": "#fcf9f8",
              "on-error": "#490006",
              "on-surface": "#ffffff",
              "error": "#ff716c",
              "surface-container-high": "#20201f",
              "surface-tint": "#81ecff",
              "primary": "#81ecff",
              "on-tertiary-container": "#001d3f",
              "primary-dim": "#00d4ec",
              "error-dim": "#d7383b",
              "primary-fixed-dim": "#00d4ec",
              "on-secondary": "#430c00",
              "surface-dim": "#0e0e0e",
              "tertiary-fixed": "#80b2ff",
              "surface-container-lowest": "#000000",
              "tertiary-container": "#599cf9",
              "on-surface-variant": "#adaaaa",
              "surface-container-low": "#131313",
              "surface-container": "#1a1a1a",
              "on-tertiary-fixed-variant": "#003971",
              "on-primary-container": "#004d57",
              "secondary-container": "#b02f00",
              "primary-fixed": "#00e3fd",
              "on-primary-fixed": "#003840",
              "on-tertiary-fixed": "#001835",
              "on-primary": "#005762",
              "surface-container-highest": "#262626",
              "outline-variant": "#484847",
              "surface": "#0e0e0e",
              "surface-variant": "#262626",
              "tertiary": "#70aaff",
              "secondary": "#ff734a",
              "on-tertiary": "#002a55",
              "error-container": "#9f0519",
              "secondary-fixed-dim": "#ffb19b",
              "tertiary-fixed-dim": "#65a4ff",
              "surface-bright": "#2c2c2c",
              "on-error-container": "#ffa8a3",
              "on-primary-fixed-variant": "#005762",
              "on-secondary-fixed": "#661700",

            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-card {
        background: rgba(38, 38, 38, 0.6);
        backdrop-filter: blur(24px);
      }
      .primary-gradient-cta {
        background: linear-gradient(135deg, #81ecff 0%, #00e3fd 100%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body selection:bg-primary/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-gradient-to-b from-[#0e0e0e] to-transparent">
<div class="flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#81ecff]" style="font-size: 28px;">graphic_eq</span>
<h1 class="text-[#81ecff] font-['Space_Grotesk'] font-black italic tracking-tighter text-2xl">tancyPlayer</h1>
</div>
<button class="active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#adaaaa] hover:text-[#81ecff] transition-colors">search</span>
</button>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto space-y-10">
<!-- Page Title -->
<section>
<h2 class="font-headline font-bold text-5xl tracking-tight mb-2">Settings</h2>
<p class="text-on-surface-variant font-body text-sm">Fine-tune your auditory environment.</p>
</section>
<!-- Sleep Timer Bento Section -->
<section class="space-y-4">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary">bedtime</span>
<h3 class="font-headline font-bold text-xl tracking-tight uppercase">Sleep Timer</h3>
</div>
<div class="grid grid-cols-2 md:grid-cols-3 gap-4">
<!-- 15 Min Card -->
<button class="group flex flex-col justify-between p-6 rounded-xl bg-surface-container-low border border-transparent hover:border-primary/20 transition-all aspect-square text-left active:scale-95 duration-300">
<span class="text-primary font-headline text-3xl font-bold">15</span>
<div class="flex justify-between items-end">
<span class="text-on-surface-variant group-hover:text-primary transition-colors font-label text-[10px] uppercase tracking-widest">Minutes</span>
<span class="material-symbols-outlined text-primary/40 group-hover:text-primary transition-colors">timer_10</span>
</div>
</button>
<!-- 30 Min Card (Highlighted) -->
<button class="relative group flex flex-col justify-between p-6 rounded-xl bg-surface-container-highest overflow-hidden active:scale-95 duration-300">
<div class="absolute inset-0 bg-primary/5 opacity-50"></div>
<span class="text-primary font-headline text-3xl font-bold relative z-10">30</span>
<div class="flex justify-between items-end relative z-10">
<span class="text-primary font-label text-[10px] uppercase tracking-widest">Minutes</span>
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Cancel Card -->
<button class="col-span-2 md:col-span-1 flex flex-col justify-between p-6 rounded-xl bg-surface-container-low hover:bg-error/10 border border-transparent hover:border-error/20 transition-all active:scale-95 duration-300 text-left">
<span class="material-symbols-outlined text-error" style="font-size: 32px;">cancel</span>
<span class="text-on-surface-variant group-hover:text-error transition-colors font-label text-[10px] uppercase tracking-widest">Cancel Timer</span>
</button>
</div>
</section>
<!-- General Settings List -->
<section class="space-y-6">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary">tune</span>
<h3 class="font-headline font-bold text-xl tracking-tight uppercase">General</h3>
</div>
<!-- Toggle: Notification Control -->
<div class="flex items-center justify-between py-4 border-b border-outline-variant/10 group">
<div class="space-y-1">
<h4 class="text-on-surface font-semibold text-lg">Show Notification Control</h4>
<p class="text-on-surface-variant text-sm">Keep playback actions in your status bar</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-12 h-6 bg-surface-container-highest rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container"></div>
</label>
</div>
<!-- Action: Rescan Storage -->
<button class="flex items-center justify-between w-full py-4 group active:scale-[0.98] transition-transform">
<div class="space-y-1 text-left">
<h4 class="text-on-surface font-semibold text-lg group-hover:text-primary transition-colors">Rescan Storage</h4>
<p class="text-on-surface-variant text-sm">Force indexer to look for new audio files</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary group-hover:translate-x-1 transition-all">refresh</span>
</button>
<!-- Decorative Visual Break -->
<div class="relative h-32 w-full rounded-2xl overflow-hidden mt-8">
<img alt="abstract visualization" class="w-full h-full object-cover opacity-40 mix-blend-screen" data-alt="abstract dark background with neon blue sonic waves and electric light pulses in a futuristic studio setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCzXMr_uH298mjGF3gByMMv7Xtrn5l1wk5KvvTtQ2QdLp63d6VoIVccvxxKpM3QOqVZvYz66d6OXBOaVy6j_cv_71pDgeMVykMx2MRQT-BRFc9XeLbL55TfNON1Ecz_TNnlcZqwTG1BiSRRx0-ZrSoXja3UyKhGAGD3s-ZFm443qfOqtzuC249ARf6SddB5Ev86bK_Yq4vJV-46XuoRYJrW4WsqfRLNFyxP_7DozPl1GaBIwcjNnvj_2nlbEw-LrdXwdlLyz0RHlg"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
<div class="absolute inset-0 flex items-center px-6">
<div class="bg-primary/10 border border-primary/20 backdrop-blur-md px-4 py-2 rounded-full">
<span class="text-primary font-label text-[10px] uppercase tracking-widest font-bold">Sonic Engine v4.0.2</span>
</div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#262626]/60 backdrop-blur-xl rounded-t-[32px] z-50 shadow-[0_-8px_24px_rgba(129,236,255,0.08)]">
<!-- Library -->
<a class="flex flex-col items-center justify-center text-[#adaaaa] px-5 py-1.5 hover:text-white transition-all active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined mb-1">library_music</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-medium">Library</span>
</a>
<!-- Playlists -->
<a class="flex flex-col items-center justify-center text-[#adaaaa] px-5 py-1.5 hover:text-white transition-all active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined mb-1">playlist_play</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-medium">Playlists</span>
</a>
<!-- Player -->
<a class="flex flex-col items-center justify-center text-[#adaaaa] px-5 py-1.5 hover:text-white transition-all active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined mb-1">play_circle</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-medium">Player</span>
</a>
<!-- Settings (ACTIVE) -->
<a class="flex flex-col items-center justify-center bg-[#81ecff] text-[#003840] rounded-full px-5 py-1.5 active:scale-90 transition-transform duration-300" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">settings</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-bold">Settings</span>
</a>
</nav>
</body></html>
