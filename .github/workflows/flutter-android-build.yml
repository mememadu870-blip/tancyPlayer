name: Flutter Android Build

on:
  workflow_dispatch:
  push:
    paths:
      - "flutter_player/**"
      - ".github/workflows/flutter-android-build.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare Flutter Android Project
        working-directory: flutter_player
        run: |
          flutter create --platforms=android --org com.tancy.player .
          git checkout -- pubspec.yaml lib android
          flutter pub get

      - name: Add Android Permissions
        working-directory: flutter_player
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path("android/app/src/main/AndroidManifest.xml")
          s = p.read_text(encoding="utf-8")
          perms = [
              '<uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>',
              '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>',
          ]
          for perm in perms:
              if perm not in s:
                  s = s.replace("<application", f"{perm}\n\n    <application", 1)
          p.write_text(s, encoding="utf-8")
          PY

      - name: Patch on_audio_query_android Namespace
        working-directory: flutter_player
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path.home() / ".pub-cache" / "hosted" / "pub.dev" / "on_audio_query_android-1.1.0" / "android" / "build.gradle"
          if p.exists():
              s = p.read_text(encoding="utf-8")
              if 'namespace "com.lucasjosino.on_audio_query"' not in s:
                  s = s.replace(
                      "android {",
                      'android {\n    namespace "com.lucasjosino.on_audio_query"',
                      1,
                  )
              if "kotlinOptions" not in s:
                  s = s.replace(
                      "    defaultConfig {\n        minSdkVersion 16\n    }\n",
                      "    defaultConfig {\n        minSdkVersion 16\n    }\n\n    kotlinOptions {\n        jvmTarget = \"1.8\"\n    }\n",
                      1,
                  )
              p.write_text(s, encoding="utf-8")
          PY

      - name: Normalize Gradle Wrapper Distribution
        working-directory: flutter_player
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path("android/gradle/wrapper/gradle-wrapper.properties")
          s = p.read_text(encoding="utf-8")
          target = "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.14-bin.zip"
          lines = []
          for line in s.splitlines():
              if line.startswith("distributionUrl="):
                  lines.append(target)
              else:
                  lines.append(line)
          p.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Build Release APK
        working-directory: flutter_player
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tancy-player-flutter-release-apk
          path: flutter_player/build/app/outputs/flutter-apk/app-release.apk
